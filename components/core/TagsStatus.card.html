<!-- @dsCard group="Components" viewport="700x320" name="Tags, Status & Icons" subtitle="Chips, PA status pills, line icons" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; padding: 24px; background: var(--color-app-bg); font-family: var(--font-body); }
  .row { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; margin-bottom: 16px; }
  .lbl { width: 100%; font: var(--weight-bold) 11px var(--font-ui); letter-spacing: .5px; text-transform: uppercase; color: var(--color-text-secondary); margin: 4px 0; }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
const { Tag, StatusPill, Icon } = window.PHILDesignSystem_bffd2d;
function Demo() {
  const colors = ['blue','gray','green','orange','purple','red'];
  return (
    <div>
      <div className="lbl">Tags — solid</div>
      <div className="row">{colors.map(c => <Tag key={c} color={c}>{c}</Tag>)}</div>
      <div className="lbl">Tags — outlined · icon · stat</div>
      <div className="row">
        <Tag color="blue" variant="outlined">Primary Insurance</Tag>
        <Tag color="green" icon={<Icon name="check" size={10} />}>NPI Verified</Tag>
        <Tag color="purple" stat={12}>Queue</Tag>
        <Tag color="orange" size="lg">Commercial</Tag>
      </div>
      <div className="lbl">PA Status Pills</div>
      <div className="row">
        <StatusPill status="pending" />
        <StatusPill status="approved" />
        <StatusPill status="denied" />
        <StatusPill status="expired" />
        <StatusPill status="cancelled" />
      </div>
      <div className="lbl">Icons</div>
      <div className="row" style={{ color: 'var(--color-brand)' }}>
        {['shield-check','copy','cloud-upload','comment','moon','check-circle','external-link','search','bell','pill'].map(n => <Icon key={n} name={n} size={22} />)}
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
</body>
</html>
