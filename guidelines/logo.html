<!-- @dsCard group="Brand" viewport="700x200" name="Logo & Avatar" subtitle="PHIL wordmark, mark, identity circle" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin:0; font-family:var(--font-display); }
  .wrap { display:flex; }
  .band { background:var(--color-header-bg); flex:1; min-height:200px; display:flex; align-items:center; justify-content:center; gap:40px; }
  .word { color:#fff; font-weight:800; font-size:42px; letter-spacing:1px; }
  .mark { width:56px; height:56px; border-radius:50%; background:rgba(255,255,255,.16); color:#fff; display:flex; align-items:center; justify-content:center; font-weight:800; font-size:24px; }
  .light { background:#fff; flex:1; display:flex; align-items:center; justify-content:center; gap:24px; box-shadow: inset 0 0 0 1px var(--color-border-muted); }
  .word-d { color:var(--color-brand); font-weight:800; font-size:42px; letter-spacing:1px; }
  .av { width:48px; height:48px; border-radius:50%; background:var(--color-brand); color:#fff; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:18px; }
</style></head>
<body>
<div class="wrap">
  <div class="band"><span class="word">PHIL</span><span class="mark">P</span></div>
  <div class="light"><span class="word-d">PHIL</span><span class="av">P</span><span class="av" style="background:var(--teal-500)">MJ</span></div>
</div>
</body></html>
