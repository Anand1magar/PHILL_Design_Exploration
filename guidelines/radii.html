<!-- @dsCard group="Spacing" viewport="700x150" name="Radii" subtitle="4 tags · 8 inputs · 12 alerts · 16 cards · pill" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin:0; padding:24px; background:#fff; font-family:var(--font-ui); }
  .row { display:flex; gap:18px; align-items:flex-end; }
  .item { text-align:center; }
  .box { width:84px; height:64px; background:var(--color-brand-tint); box-shadow: inset 0 0 0 1.5px var(--color-brand); }
  .n { font-size:11px; font-weight:700; color:var(--color-text-default); margin-top:8px; }
  .v { font-size:10px; color:var(--color-text-secondary); }
</style></head>
<body>
<div class="row">
  <div class="item"><div class="box" style="border-radius:var(--radius-xs)"></div><div class="n">xs</div><div class="v">4 · tags</div></div>
  <div class="item"><div class="box" style="border-radius:var(--radius-md)"></div><div class="n">md</div><div class="v">8 · inputs</div></div>
  <div class="item"><div class="box" style="border-radius:var(--radius-lg)"></div><div class="n">lg</div><div class="v">12 · alerts</div></div>
  <div class="item"><div class="box" style="border-radius:var(--radius-xl)"></div><div class="n">xl</div><div class="v">16 · cards</div></div>
  <div class="item"><div class="box" style="border-radius:var(--radius-pill);width:64px"></div><div class="n">pill</div><div class="v">9999 · pills</div></div>
</div>
</body></html>
