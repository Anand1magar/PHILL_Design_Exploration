<!-- @dsCard group="Spacing" viewport="700x150" name="Elevation" subtitle="Card, input ring, dropdown shadows" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin:0; padding:28px; background:var(--color-app-bg); font-family:var(--font-ui); }
  .row { display:flex; gap:24px; }
  .item { text-align:center; }
  .box { width:140px; height:70px; background:#fff; border-radius:var(--radius-xl); }
  .n { font-size:11px; font-weight:700; color:var(--color-text-default); margin-top:12px; }
</style></head>
<body>
<div class="row">
  <div class="item"><div class="box" style="box-shadow:var(--shadow-card)"></div><div class="n">card</div></div>
  <div class="item"><div class="box" style="box-shadow:var(--shadow-xs)"></div><div class="n">xs / input</div></div>
  <div class="item"><div class="box" style="box-shadow:var(--shadow-md)"></div><div class="n">md / dropdown</div></div>
</div>
</body></html>
